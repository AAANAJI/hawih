name: Deploy Hawih site

# Auto-deploys the static Hawih site to the production server on every
# push to main / the working branch (and on manual run). Runs on a
# GitHub-hosted runner, which CAN reach the server over SSH (port 22) —
# unlike the Claude Code sandbox, whose network policy blocks port 22.
#
# Replicates the proven manual deploy: rsync -> chown www-data ->
# chmod 644/755 -> ensure /var/log/hawih-leads -> nginx -t && reload.
#
# Deploys ONLY into HAWIH_DOCROOT. The Rise CRM is a separate vhost and
# is never referenced; a gate aborts if the target looks like the CRM.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   SSH_HOST        108.61.89.48
#   SSH_USER        root
#   SSH_PASSWORD    server password
#   HAWIH_DOCROOT   /var/www/hawih-site      (the real path you used)
#   SSH_PORT        optional, defaults to 22

on:
  push:
    branches: [ main, "claude/hawih-optimal-design-ozqG9" ]
    paths-ignore: [ "reference/**", "**.md", ".github/**" ]
  workflow_dispatch:

concurrency:
  group: deploy-hawih
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gate on secrets
        id: gate
        env:
          HOST: ${{ secrets.SSH_HOST }}
        run: |
          if [ -z "$HOST" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy secrets not set yet — skipping. Add SSH_HOST, SSH_USER, SSH_PASSWORD, HAWIH_DOCROOT (Settings → Secrets and variables → Actions), then re-run."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install tools
        if: steps.gate.outputs.configured == 'true'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass rsync

      - name: Generate SEO artifacts (idempotent)
        if: steps.gate.outputs.configured == 'true'
        run: |
          # All scripts are idempotent — re-running matches committed
          # state. We re-run in CI as a safety net so the deployed tree
          # is always in sync with the source-of-truth pages, sitemap
          # lastmod is fresh, and the /en/ mirror reflects any AR edits
          # someone made without running the build locally.
          python3 scripts/inject-head.py
          python3 scripts/optimize-images.py
          python3 scripts/optimize-perf.py
          python3 scripts/a11y-fix.py
          python3 scripts/build-en-mirror.py
          python3 scripts/improve-alts.py
          python3 scripts/inject-jsonld.py
          python3 scripts/generate-sitemap.py
          # Must run LAST: stamps ?v=<hash> on hawih.css/js across the
          # final HTML (AR + EN) so returning visitors fetch fresh assets
          # the instant a real change ships, without waiting for the
          # browser cache to expire.
          python3 scripts/version-assets.py

      - name: Build clean deploy tree
        if: steps.gate.outputs.configured == 'true'
        run: |
          mkdir -p .deploy
          rsync -a --delete \
            --exclude='.git' --exclude='.github' --exclude='.deploy' \
            --exclude='reference/' --exclude='*.md' \
            --exclude='CRM_INTEGRATION_PLAYBOOK*' --exclude='DEPLOY*' \
            ./ ./.deploy/
          echo "Files to deploy: $(find .deploy -type f | wc -l)"

      - name: Show Hawih vhost root (diagnostic, read-only)
        if: steps.gate.outputs.configured == 'true'
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USER }}
          PORT: ${{ secrets.SSH_PORT }}
        run: |
          PORT="${PORT:-22}"
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=25 -p "$PORT" "$USER@$HOST" \
            "grep -RsE 'server_name|root ' /etc/nginx/sites-enabled/ 2>/dev/null | grep -iE 'hawih|crm|root ' | head -40" || true

      - name: Safety gate + backup (remote)
        if: steps.gate.outputs.configured == 'true'
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USER }}
          PORT: ${{ secrets.SSH_PORT }}
          DOCROOT: ${{ secrets.HAWIH_DOCROOT }}
        run: |
          PORT="${PORT:-22}"
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=25 -p $PORT $USER@$HOST"
          # Hawih site has index.html and NO CodeIgniter app. Rise CRM has
          # application/ + system/core/CodeIgniter.php — refuse to write there.
          if ! $SSH "test -d '$DOCROOT' && test -f '$DOCROOT/index.html' && ! test -d '$DOCROOT/application' && ! test -f '$DOCROOT/system/core/CodeIgniter.php'"; then
            echo "::error::HAWIH_DOCROOT failed the safety check (no index.html, or it looks like the CRM). Aborting — nothing changed."
            exit 1
          fi
          # Rotate backups BEFORE creating a new one. Each deploy writes a
          # /root/hawih-backup-*.tgz; left unpruned they accumulate and fill
          # the partition, which makes `tar` fail with exit 2 (fatal) and
          # aborts the deploy. Keep only the 3 most recent, delete the rest,
          # so the disk can never be filled by backup history.
          echo "Disk before prune:"; $SSH "df -h / | tail -1"
          $SSH "ls -1t /root/hawih-backup-*.tgz 2>/dev/null | tail -n +4 | xargs -r rm -f; echo 'Backups retained:'; ls -1t /root/hawih-backup-*.tgz 2>/dev/null | wc -l"
          # Create the new backup. tar exit 1 = benign warnings (e.g. a file
          # changed as we read the live docroot); exit >=2 = fatal (disk
          # full, unwritable path) and must abort the deploy. stderr is left
          # visible so the cause surfaces in the log.
          $SSH "tar czf /root/hawih-backup-\$(date +%F-%H%M%S).tgz -C '$DOCROOT' . ; rc=\$?; if [ \$rc -gt 1 ]; then echo \"backup tar failed rc=\$rc\"; exit \$rc; fi; ls -1t /root/hawih-backup-*.tgz | head -1"
          echo "Disk after backup:"; $SSH "df -h / | tail -1"

      - name: Deploy site (rsync — CRM untouched)
        if: steps.gate.outputs.configured == 'true'
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USER }}
          PORT: ${{ secrets.SSH_PORT }}
          DOCROOT: ${{ secrets.HAWIH_DOCROOT }}
        run: |
          PORT="${PORT:-22}"
          rsync -az --delete \
            --exclude='.well-known/' --exclude='uploads/' --exclude='.user.ini' \
            -e "sshpass -e ssh -o StrictHostKeyChecking=accept-new -p $PORT" \
            ./.deploy/ "$USER@$HOST:$DOCROOT/"

      - name: Post-deploy (perms, leads log, nginx reload)
        if: steps.gate.outputs.configured == 'true'
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USER }}
          PORT: ${{ secrets.SSH_PORT }}
          DOCROOT: ${{ secrets.HAWIH_DOCROOT }}
        run: |
          PORT="${PORT:-22}"
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=25 -p "$PORT" "$USER@$HOST" bash -s <<EOF
          set -e
          chown -R www-data:www-data "$DOCROOT"
          find "$DOCROOT" -type f -exec chmod 644 {} \;
          find "$DOCROOT" -type d -exec chmod 755 {} \;
          mkdir -p /var/log/hawih-leads
          chown www-data:www-data /var/log/hawih-leads
          chmod 750 /var/log/hawih-leads
          nginx -t && systemctl reload nginx
          EOF

      - name: Verify
        if: steps.gate.outputs.configured == 'true'
        run: |
          code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 20 https://hawih.com.sa/ || true)
          echo "https://hawih.com.sa/ -> $code"
          [ "$code" = "200" ] || echo "::warning::Home returned $code — check the site."
