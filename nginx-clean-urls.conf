# ===================================================================
# Hawih site — Clean URL + SEO/perf nginx configuration
# ===================================================================
# Apply this snippet inside the `server { ... }` block of the Hawih
# vhost at /etc/nginx/sites-available/hawih (or wherever the vhost
# lives). After editing, test + reload:
#
#   nginx -t && systemctl reload nginx
#
# What it does:
#   1. Serves /contact, /about, /services, /work-nab, etc. — without
#      ".html" — by transparently looking up the matching .html file
#      on disk via `try_files`.
#   2. Redirects /contact.html → /contact (and similar) with a 301
#      Permanent Redirect, so the .html URL is canonicalised to the
#      clean form. This keeps existing inbound links working while
#      preferring the clean URL going forward.
#   3. Leaves /api/*.php alone (lead-form endpoint) and any actual
#      directory or static asset.
#   4. SEO/perf block (added Phase 0):
#        - gzip compression for text-shaped responses
#        - long-lived browser cache for /assets/ (images, fonts, css/js)
#        - short cache + must-revalidate for HTML
#        - security headers (no HSTS until all subdomains audited)
# ===================================================================

# ----- Compression --------------------------------------------------
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/rss+xml
    application/atom+xml
    application/ld+json
    image/svg+xml
    font/ttf
    font/otf;

# ----- Security headers (safe defaults; HSTS deferred) --------------
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header X-Frame-Options "SAMEORIGIN" always;

# ----- Browser caching by asset type --------------------------------
# Long-cache static fingerprintable assets.
location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg)$ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
}
location ~* \.(?:png|jpg|jpeg|gif|webp|avif|ico)$ {
    expires 6M;
    add_header Cache-Control "public" always;
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
}

# (1) Redirect *.html requests to the clean URL.
#     Place this BEFORE the catch-all `location /` block.
location ~ ^/(?!api/)(.+)\.html$ {
    return 301 /$1;
}

# Special case: /index.html (or /) → root
location = /index.html {
    return 301 /;
}

# robots.txt + sitemap.xml: serve directly with no caching tricks.
location = /robots.txt {
    add_header Cache-Control "public, max-age=86400" always;
    try_files $uri =404;
}
location = /sitemap.xml {
    add_header Cache-Control "public, max-age=86400" always;
    try_files $uri =404;
}

# (2) Serve clean URLs by trying $uri.html when $uri itself isn't a
#     real file/directory. HTML gets a short cache + must-revalidate
#     so SEO/meta updates propagate quickly.
location / {
    expires 1h;
    add_header Cache-Control "public, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Try in order:
    #   - the exact request (a real file or directory)
    #   - request + .html (clean-URL → HTML page mapping)
    #   - request + / (directory)
    #   - 404
    try_files $uri $uri.html $uri/ =404;
}
