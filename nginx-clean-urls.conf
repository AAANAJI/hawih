# ===================================================================
# Hawih site — Clean URL nginx configuration
# ===================================================================
# Apply this snippet inside the `server { ... }` block of the Hawih
# vhost at /etc/nginx/sites-available/hawih (or wherever the vhost
# lives). After editing, test + reload:
#
#   nginx -t && systemctl reload nginx
#
# What it does:
#   1. Serves /contact, /about, /services, /work-nab, etc. — without
#      ".html" — by transparently looking up the matching .html file
#      on disk via `try_files`.
#   2. Redirects /contact.html → /contact (and similar) with a 301
#      Permanent Redirect, so the .html URL is canonicalised to the
#      clean form. This keeps existing inbound links working while
#      preferring the clean URL going forward.
#   3. Leaves /api/*.php alone (lead-form endpoint) and any actual
#      directory or static asset.
# ===================================================================

# (1) Redirect *.html requests to the clean URL.
#     Place this BEFORE the catch-all `location /` block.
location ~ ^/(?!api/)(.+)\.html$ {
    return 301 /$1;
}

# Special case: /index.html (or /) → root
location = /index.html {
    return 301 /;
}

# (2) Serve clean URLs by trying $uri.html when $uri itself isn't a
#     real file/directory.
location / {
    # Try in order:
    #   - the exact request (a real file or directory)
    #   - request + .html (clean-URL → HTML page mapping)
    #   - request + / (directory)
    #   - 404
    try_files $uri $uri.html $uri/ =404;
}
